<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HD Wallet Derivation Tool</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.5/ethers.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --bg-primary: #0a0b0f;
    --bg-secondary: #12141c;
    --bg-tertiary: #1a1d2b;
    --bg-card: #161825;
    --border: #252840;
    --border-active: #4f46e5;
    --text-primary: #e8e9ed;
    --text-secondary: #8b8fa3;
    --text-dim: #555873;
    --accent: #6366f1;
    --accent-glow: rgba(99, 102, 241, 0.15);
    --success: #22c55e;
    --success-dim: rgba(34, 197, 94, 0.12);
    --warning: #f59e0b;
    --error: #ef4444;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--sans);
    min-height: 100vh;
    line-height: 1.6;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 40px;
  }
  .header-icon {
    width: 56px; height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--accent), #818cf8);
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
    box-shadow: 0 8px 32px var(--accent-glow);
  }
  .header-icon svg { width: 28px; height: 28px; }
  .header h1 {
    font-size: 26px; font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  .header p {
    font-size: 14px; color: var(--text-secondary);
  }

  /* Sections */
  .section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .section-title {
    font-size: 13px; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
  }

  /* Tabs */
  .tabs {
    display: flex; gap: 4px;
    background: var(--bg-primary);
    border-radius: 10px; padding: 4px;
    margin-bottom: 16px;
  }
  .tab {
    flex: 1; padding: 10px 16px;
    border: none; border-radius: 8px;
    background: transparent;
    color: var(--text-secondary);
    font-family: var(--sans);
    font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .tab.active {
    background: var(--bg-tertiary);
    color: var(--text-primary);
  }
  .tab:hover:not(.active) { color: var(--text-primary); }

  /* Input */
  .input-area {
    width: 100%;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text-primary);
    font-family: var(--mono);
    font-size: 12px;
    resize: vertical;
    min-height: 100px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-area:focus { border-color: var(--accent); }
  .input-area::placeholder { color: var(--text-dim); }

  /* Camera */
  .camera-container {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    background: #000;
    aspect-ratio: 4/3;
    display: none;
  }
  .camera-container.active { display: block; }
  .camera-container video {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .camera-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .scan-frame {
    width: 220px; height: 220px;
    border: 2px solid rgba(99, 102, 241, 0.6);
    border-radius: 16px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
    animation: pulse-frame 2s ease-in-out infinite;
  }
  @keyframes pulse-frame {
    0%, 100% { border-color: rgba(99, 102, 241, 0.4); }
    50% { border-color: rgba(99, 102, 241, 0.9); }
  }
  .scan-status {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    padding: 8px 16px; border-radius: 8px;
    font-size: 12px; color: var(--text-secondary);
    backdrop-filter: blur(8px);
  }

  /* File upload */
  .file-drop {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }
  .file-drop.active { display: block; }
  .file-drop:hover { border-color: var(--accent); background: var(--accent-glow); }
  .file-drop input { display: none; }
  .file-drop-text { color: var(--text-secondary); font-size: 13px; }
  .file-drop-text strong { color: var(--accent); }

  /* Buttons */
  .btn {
    padding: 10px 20px;
    border: none; border-radius: 8px;
    font-family: var(--sans);
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #5558e6; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-secondary {
    background: var(--bg-tertiary);
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { color: var(--text-primary); border-color: var(--text-dim); }

  .action-row {
    display: flex; gap: 10px; margin-top: 16px;
    align-items: center; flex-wrap: wrap;
  }

  /* Key info */
  .key-info {
    display: none;
  }
  .key-info.visible { display: block; }
  .info-grid {
    display: grid; gap: 12px;
  }
  .info-item label {
    display: block;
    font-size: 11px; font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .info-item .val {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-secondary);
    word-break: break-all;
    background: var(--bg-primary);
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
  }
  .info-item .val.path {
    color: var(--accent);
    font-weight: 500;
  }

  /* Derivation controls */
  .derive-controls {
    display: none;
    gap: 12px; align-items: end; flex-wrap: wrap;
    margin-top: 16px;
  }
  .derive-controls.visible { display: flex; }
  .form-group label {
    display: block;
    font-size: 11px; font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .form-group input, .form-group select {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text-primary);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    width: 120px;
  }
  .form-group input:focus, .form-group select:focus {
    border-color: var(--accent);
  }

  /* Address table */
  .address-table-wrap {
    display: none;
    margin-top: 0;
    max-height: 520px;
    overflow-y: auto;
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .address-table-wrap.visible { display: block; }
  .address-table-wrap::-webkit-scrollbar { width: 6px; }
  .address-table-wrap::-webkit-scrollbar-track { background: var(--bg-primary); }
  .address-table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead { position: sticky; top: 0; z-index: 2; }
  thead th {
    background: var(--bg-tertiary);
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
  }
  tbody td {
    padding: 8px 14px;
    border-bottom: 1px solid rgba(37, 40, 64, 0.5);
    vertical-align: middle;
  }
  tbody tr:hover { background: rgba(99, 102, 241, 0.04); }
  .idx {
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 12px;
    width: 50px;
  }
  .addr-cell {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-secondary);
    word-break: break-all;
  }
  .path-cell {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .copy-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px;
    color: var(--text-dim); cursor: pointer;
    font-size: 11px; font-family: var(--mono);
    transition: all 0.15s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--success); color: var(--success); }

  /* Status */
  .status {
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }
  .status.visible { display: flex; align-items: center; gap: 8px; }
  .status.error { background: rgba(239,68,68,0.1); color: var(--error); border: 1px solid rgba(239,68,68,0.2); }
  .status.success { background: var(--success-dim); color: var(--success); border: 1px solid rgba(34,197,94,0.2); }
  .status.info { background: var(--accent-glow); color: #818cf8; border: 1px solid rgba(99,102,241,0.2); }

  /* Export */
  .export-row {
    display: none; gap: 10px; margin-top: 14px;
  }
  .export-row.visible { display: flex; }

  /* Spinner */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid transparent;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Count badge */
  .count-badge {
    background: var(--accent);
    color: #fff;
    font-size: 11px; font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 8px;
  }
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="8" height="8" rx="1"/><rect x="14" y="2" width="8" height="8" rx="1"/>
        <rect x="2" y="14" width="8" height="8" rx="1"/><path d="M14 14h4v4h-4z"/>
        <path d="M22 14h-2v4h-2v4h4v-4h0z"/>
      </svg>
    </div>
    <h1>QR Hardware Wallet Connector</h1>
    <p>Decode UR:CRYPTO-HDKEY and derive Ethereum addresses &mdash; MetaMask compatible</p>
  </div>

  <!-- Input Section -->
  <div class="section">
    <div class="section-title"><span class="dot"></span> Import Extended Public Key</div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('paste')">Paste UR</button>
      <button class="tab" onclick="switchTab('camera')">Camera Scan</button>
      <button class="tab" onclick="switchTab('file')">Upload QR Image</button>
    </div>

    <!-- Paste -->
    <div id="tab-paste">
      <textarea class="input-area" id="ur-input" placeholder="Paste your UR:CRYPTO-HDKEY/... string here&#10;&#10;Example: ur:crypto-hdkey/otaxhdclaowdverokopdinhseeroisyaldrdloeil..."></textarea>
    </div>

    <!-- Camera -->
    <div id="tab-camera" style="display:none">
      <div class="camera-container" id="camera-box">
        <video id="camera-video" autoplay playsinline></video>
        <div class="camera-overlay"><div class="scan-frame"></div></div>
        <div class="scan-status" id="scan-status">Point camera at QR code...</div>
      </div>
      <div class="action-row">
        <button class="btn btn-secondary" id="btn-camera" onclick="toggleCamera()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          Start Camera
        </button>
      </div>
    </div>

    <!-- File -->
    <div id="tab-file" style="display:none">
      <div class="file-drop active" id="file-drop" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" accept="image/*" onchange="handleFileUpload(event)">
        <div class="file-drop-text">
          <strong>Click to upload</strong> or drag a QR code image<br>
          <span style="font-size:12px;color:var(--text-dim)">PNG, JPG, or SVG</span>
        </div>
      </div>
    </div>

    <div id="status" class="status"></div>

    <div class="action-row">
      <button class="btn btn-primary" id="btn-decode" onclick="decodeInput()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg>
        Decode &amp; Derive
      </button>
      <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
    </div>
  </div>

  <!-- Key Info -->
  <div class="section key-info" id="key-info">
    <div class="section-title"><span class="dot"></span> Extended Public Key Info</div>
    <div class="info-grid">
      <div class="info-item"><label>Derivation Path (Origin)</label><div class="val path" id="info-path"></div></div>
      <div class="info-item"><label>Public Key (compressed, hex)</label><div class="val" id="info-pubkey"></div></div>
      <div class="info-item"><label>Chain Code (hex)</label><div class="val" id="info-chaincode"></div></div>
      <div class="info-item"><label>xpub</label><div class="val" id="info-xpub" style="font-size:11px"></div></div>
    </div>
    <div class="derive-controls visible" id="derive-controls">
      <div class="form-group">
        <label>Addresses to Derive</label>
        <input type="number" id="derive-count" value="100" min="1" max="1000">
      </div>
      <div class="form-group">
        <label>Start Index</label>
        <input type="number" id="derive-start" value="0" min="0">
      </div>
      <button class="btn btn-primary" onclick="rederive()">Re-derive</button>
    </div>
  </div>

  <!-- Address Table -->
  <div class="section" id="addr-section" style="display:none">
    <div class="section-title">
      <span class="dot"></span> Derived Addresses
      <span class="count-badge" id="addr-count">0</span>
    </div>
    <div class="export-row visible" id="export-row">
      <button class="btn btn-secondary" onclick="exportCSV()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export CSV
      </button>
      <button class="btn btn-secondary" onclick="copyAll()">Copy All</button>
    </div>
    <div class="address-table-wrap visible" id="addr-table-wrap">
      <table>
        <thead><tr><th>#</th><th>Path</th><th>Address</th><th></th></tr></thead>
        <tbody id="addr-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<canvas id="qr-canvas" style="display:none"></canvas>

<script>
// ============================================================
// BYTEWORDS
// ============================================================
const BYTEWORDS = 'able acid also apex aqua arch atom aunt away axis back bald barn belt bias blue body brag brew bulb buzz calm cash cats chef city claw code cola cook cost crux curl cusp cyan dark data days deli dice diet door down draw drop drum dull duty each easy echo edge epic even exam exec exit eyes fact fair fern film fish fizz flap flew flux foxy free frog fuel fund gala game gear gems gift girl glow good gray grim guru gush gust gyro half hang hard hawk heat help hero high hill holy hope horn huts iced idea idle inch iron item jade jazz join jolt jowl judo jugs jump junk jury just keen keep keno kept keys kick kiln king kite kiwi knob lamb lang laps lava lazy leaf legs liar limb lion list logo loud love luck lung main many math maze memo menu meow mild mint miss monk nail navy need news next noon note numb obey oboe omit onyx open oval owls paid part paws play plot plus poem pool pose puff puma purr quad quiz race ramp redo rich road rock roof ruby ruin runs rust safe saga scar sets silk skew slot soap solo song stub surf swan taco task taxi tent tied tiny toil tomb toys trip tuna twin ugly undo unit urge user vast very veto vial view visa void vows wall wand warm wasp wave waxy webs what when whiz wolf work yank yawn yell yoga yurt zaps zero zest zinc zone zoom'.split(' ');

const BW_MINIMAL = {};
BYTEWORDS.forEach((w, i) => { BW_MINIMAL[w[0] + w[w.length - 1]] = i; });

function decodeBytewordsMinimal(str) {
  str = str.toLowerCase();
  const bytes = [];
  for (let i = 0; i < str.length; i += 2) {
    const pair = str.substring(i, i + 2);
    if (!(pair in BW_MINIMAL)) throw new Error(`Unknown byteword pair: "${pair}" at position ${i}`);
    bytes.push(BW_MINIMAL[pair]);
  }
  return new Uint8Array(bytes);
}

// ============================================================
// CRC32 (ISO 3309)
// ============================================================
const CRC32_TABLE = new Uint32Array(256);
(function() {
  for (let i = 0; i < 256; i++) {
    let c = i;
    for (let j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    CRC32_TABLE[i] = c;
  }
})();

function crc32(data) {
  let crc = 0xFFFFFFFF;
  for (let i = 0; i < data.length; i++) crc = CRC32_TABLE[(crc ^ data[i]) & 0xFF] ^ (crc >>> 8);
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

// ============================================================
// CBOR DECODER (minimal, sufficient for CRYPTO-HDKEY)
// ============================================================
function decodeCBOR(data) {
  let offset = 0;

  function readByte() { return data[offset++]; }

  function readBytes(n) {
    const s = data.slice(offset, offset + n);
    offset += n;
    return s;
  }

  function readUint(additionalInfo) {
    if (additionalInfo < 24) return additionalInfo;
    if (additionalInfo === 24) return readByte();
    if (additionalInfo === 25) {
      const b = readBytes(2);
      return (b[0] << 8) | b[1];
    }
    if (additionalInfo === 26) {
      const b = readBytes(4);
      return ((b[0] << 24) | (b[1] << 16) | (b[2] << 8) | b[3]) >>> 0;
    }
    if (additionalInfo === 27) {
      const b = readBytes(8);
      // JS safe integer range
      let val = 0;
      for (let i = 0; i < 8; i++) val = val * 256 + b[i];
      return val;
    }
    throw new Error(`Unsupported additional info: ${additionalInfo}`);
  }

  function decode() {
    const initial = readByte();
    const major = initial >> 5;
    const ai = initial & 0x1F;

    switch (major) {
      case 0: // unsigned int
        return readUint(ai);
      case 1: // negative int
        return -1 - readUint(ai);
      case 2: { // byte string
        const len = readUint(ai);
        return readBytes(len);
      }
      case 3: { // text string
        const len = readUint(ai);
        const bytes = readBytes(len);
        return new TextDecoder().decode(bytes);
      }
      case 4: { // array
        const len = readUint(ai);
        const arr = [];
        for (let i = 0; i < len; i++) arr.push(decode());
        return arr;
      }
      case 5: { // map
        const len = readUint(ai);
        const map = {};
        for (let i = 0; i < len; i++) {
          const key = decode();
          const val = decode();
          map[key] = val;
        }
        return map;
      }
      case 6: { // tag
        const tag = readUint(ai);
        const value = decode();
        return { _tag: tag, _value: value };
      }
      case 7: { // simple / float
        if (ai === 20) return false;
        if (ai === 21) return true;
        if (ai === 22) return null;
        if (ai === 25) { // float16
          const b = readBytes(2);
          return parseFloat16(b);
        }
        if (ai === 26) { // float32
          const b = readBytes(4);
          const buf = new ArrayBuffer(4);
          new Uint8Array(buf).set(b);
          return new DataView(buf).getFloat32(0);
        }
        if (ai === 27) { // float64
          const b = readBytes(8);
          const buf = new ArrayBuffer(8);
          new Uint8Array(buf).set(b);
          return new DataView(buf).getFloat64(0);
        }
        return ai; // simple value
      }
    }
    throw new Error(`Unknown CBOR major type: ${major}`);
  }

  function parseFloat16(bytes) {
    const half = (bytes[0] << 8) | bytes[1];
    const sign = (half >> 15) & 1;
    const exp = (half >> 10) & 0x1F;
    const mant = half & 0x3FF;
    if (exp === 0) return (sign ? -1 : 1) * 5.9604644775390625e-8 * mant;
    if (exp === 31) return mant ? NaN : (sign ? -Infinity : Infinity);
    return (sign ? -1 : 1) * Math.pow(2, exp - 15) * (1 + mant / 1024);
  }

  return decode();
}

// ============================================================
// UR DECODER
// ============================================================
function decodeUR(urString) {
  let s = urString.trim();
  const lower = s.toLowerCase();

  // Check for UR:CRYPTO-HDKEY prefix
  const prefix = 'ur:crypto-hdkey/';
  if (!lower.startsWith(prefix)) {
    throw new Error('Invalid format. Expected UR:CRYPTO-HDKEY/...');
  }

  let payload = s.substring(prefix.length);

  // Handle multi-part: ur:crypto-hdkey/N-M/payload (skip for now, detect)
  if (/^\d+-\d+\//.test(payload)) {
    throw new Error('Multi-part (animated) UR QR detected. Please scan all frames or paste the complete reassembled UR string.');
  }

  // Decode bytewords minimal
  const allBytes = decodeBytewordsMinimal(payload);

  if (allBytes.length < 5) throw new Error('Payload too short');

  // Split CBOR data and CRC32 checksum
  const cborData = allBytes.slice(0, allBytes.length - 4);
  const checksumBytes = allBytes.slice(allBytes.length - 4);
  const expectedCRC = ((checksumBytes[0] << 24) | (checksumBytes[1] << 16) | (checksumBytes[2] << 8) | checksumBytes[3]) >>> 0;
  const actualCRC = crc32(cborData);

  if (expectedCRC !== actualCRC) {
    throw new Error(`CRC32 mismatch (expected ${expectedCRC.toString(16)}, got ${actualCRC.toString(16)}). Data may be corrupted.`);
  }

  return decodeCBOR(cborData);
}

// ============================================================
// CRYPTO-HDKEY PARSER
// ============================================================
function parseCryptoHDKey(cbor) {
  // Unwrap tag if present
  let map = cbor;
  if (map && map._tag !== undefined) map = map._value;

  if (typeof map !== 'object' || map === null) {
    throw new Error('Expected CBOR map for CRYPTO-HDKEY');
  }

  // Key 2: is-private (default false)
  const isPrivate = map[2] === true;
  if (isPrivate) throw new Error('This is a private key. Only public keys are supported.');

  // Key 3: key-data (33 bytes compressed pubkey)
  const keyData = map[3];
  if (!keyData || keyData.length !== 33) {
    throw new Error('Missing or invalid key-data (expected 33 bytes compressed public key)');
  }

  // Key 4: chain-code (32 bytes)
  const chainCode = map[4];
  if (!chainCode || chainCode.length !== 32) {
    throw new Error('Missing or invalid chain-code (expected 32 bytes)');
  }

  // Key 6: origin (crypto-keypath)
  let origin = null;
  if (map[6]) {
    origin = parseKeypath(map[6]);
  }

  // Key 7: children (crypto-keypath)
  let children = null;
  if (map[7]) {
    children = parseKeypath(map[7]);
  }

  // Key 8: parent-fingerprint
  let parentFingerprint = 0;
  if (map[8]) {
    if (map[8] instanceof Uint8Array) {
      for (let i = 0; i < Math.min(4, map[8].length); i++) {
        parentFingerprint = (parentFingerprint << 8) | map[8][i];
      }
      parentFingerprint = parentFingerprint >>> 0;
    } else {
      parentFingerprint = map[8] >>> 0;
    }
  }

  return { keyData, chainCode, origin, children, parentFingerprint, isPrivate };
}

function parseKeypath(kp) {
  let obj = kp;
  if (obj && obj._tag !== undefined) obj = obj._value;

  const components = [];
  const rawComponents = obj[1] || [];

  // Components alternate: [child-index, is-hardened, child-index, is-hardened, ...]
  for (let i = 0; i < rawComponents.length; i += 2) {
    const index = rawComponents[i];
    const hardened = rawComponents[i + 1] === true;
    components.push({ index, hardened });
  }

  const sourceFingerprint = obj[2] || 0;
  const depth = obj[3] !== undefined ? obj[3] : components.length;

  return { components, sourceFingerprint, depth };
}

function keypathToString(kp) {
  if (!kp) return 'unknown';
  return 'm/' + kp.components.map(c => c.index + (c.hardened ? "'" : '')).join('/');
}

// ============================================================
// XPUB BUILDER
// ============================================================
function buildXpub(pubkey, chaincode, depth, parentFingerprint, childIndex) {
  const buf = new Uint8Array(78);

  // Version: xpub (0x0488B21E)
  buf[0] = 0x04; buf[1] = 0x88; buf[2] = 0xB2; buf[3] = 0x1E;
  // Depth
  buf[4] = depth & 0xFF;
  // Parent fingerprint (4 bytes big-endian)
  buf[5] = (parentFingerprint >>> 24) & 0xFF;
  buf[6] = (parentFingerprint >>> 16) & 0xFF;
  buf[7] = (parentFingerprint >>> 8) & 0xFF;
  buf[8] = parentFingerprint & 0xFF;
  // Child index (4 bytes big-endian)
  buf[9] = (childIndex >>> 24) & 0xFF;
  buf[10] = (childIndex >>> 16) & 0xFF;
  buf[11] = (childIndex >>> 8) & 0xFF;
  buf[12] = childIndex & 0xFF;
  // Chain code (32 bytes)
  buf.set(chaincode, 13);
  // Public key (33 bytes)
  buf.set(pubkey, 45);

  // Double SHA-256 checksum
  const hash1Hex = ethers.sha256(buf);
  const hash2Hex = ethers.sha256(hash1Hex);
  const hash2Bytes = ethers.getBytes(hash2Hex);
  const checksum = hash2Bytes.slice(0, 4);

  // Concatenate payload + checksum
  const result = new Uint8Array(82);
  result.set(buf);
  result.set(checksum, 78);

  return ethers.encodeBase58(result);
}

// ============================================================
// DERIVE ADDRESSES
// ============================================================
let currentHDKey = null;
let currentXpub = '';
let derivedAddresses = [];

function deriveAddresses(xpub, originPath, startIdx, count) {
  const node = ethers.HDNodeWallet.fromExtendedKey(xpub);

  // Determine derivation: if origin ends at account level (m/44'/60'/0'),
  // derive /0/i. If at m/44'/60'/0'/0, derive /i.
  let needsChangeLevel = true;
  if (originPath) {
    const comps = originPath.components;
    // If last component is non-hardened 0 (change level), derive /i directly
    if (comps.length >= 4 && !comps[comps.length - 1].hardened && comps[comps.length - 1].index === 0) {
      needsChangeLevel = false;
    }
  }

  const baseNode = needsChangeLevel ? node.deriveChild(0) : node;
  const addresses = [];

  for (let i = startIdx; i < startIdx + count; i++) {
    const child = baseNode.deriveChild(i);
    const suffix = needsChangeLevel ? `/0/${i}` : `/${i}`;
    addresses.push({
      index: i,
      path: keypathToString(originPath) + suffix,
      address: child.address
    });
  }

  return addresses;
}

// ============================================================
// UI LOGIC
// ============================================================
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['paste', 'camera', 'file'][i] === tab);
  });
  document.getElementById('tab-paste').style.display = tab === 'paste' ? '' : 'none';
  document.getElementById('tab-camera').style.display = tab === 'camera' ? '' : 'none';
  document.getElementById('tab-file').style.display = tab === 'file' ? '' : 'none';

  if (tab !== 'camera') stopCamera();
}

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.className = 'status visible ' + type;
  const icons = { error: '✕', success: '✓', info: '◌' };
  el.innerHTML = `<span>${icons[type] || ''}</span> ${msg}`;
}

function hideStatus() {
  document.getElementById('status').className = 'status';
}

function clearAll() {
  document.getElementById('ur-input').value = '';
  document.getElementById('key-info').classList.remove('visible');
  document.getElementById('addr-section').style.display = 'none';
  hideStatus();
  currentHDKey = null;
  currentXpub = '';
  derivedAddresses = [];
  stopCamera();
}

function bytesToHex(bytes) {
  return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
}

function decodeInput() {
  hideStatus();
  const input = document.getElementById('ur-input').value.trim();
  if (!input) {
    showStatus('Please paste a UR:CRYPTO-HDKEY string.', 'error');
    return;
  }
  processUR(input);
}

function processUR(urString) {
  try {
    hideStatus();
    showStatus('Decoding UR payload...', 'info');

    const cbor = decodeUR(urString);
    const hdkey = parseCryptoHDKey(cbor);
    currentHDKey = hdkey;

    // Determine depth and child index for xpub
    let depth = 0, childIndex = 0;
    if (hdkey.origin) {
      depth = hdkey.origin.depth || hdkey.origin.components.length;
      const lastComp = hdkey.origin.components[hdkey.origin.components.length - 1];
      if (lastComp) {
        childIndex = lastComp.index;
        if (lastComp.hardened) childIndex |= 0x80000000;
      }
    }

    const xpub = buildXpub(hdkey.keyData, hdkey.chainCode, depth, hdkey.parentFingerprint, childIndex);
    currentXpub = xpub;

    // Show key info
    document.getElementById('info-path').textContent = keypathToString(hdkey.origin);
    document.getElementById('info-pubkey').textContent = bytesToHex(hdkey.keyData);
    document.getElementById('info-chaincode').textContent = bytesToHex(hdkey.chainCode);
    document.getElementById('info-xpub').textContent = xpub;
    document.getElementById('key-info').classList.add('visible');

    // Derive addresses
    const count = parseInt(document.getElementById('derive-count').value) || 100;
    const start = parseInt(document.getElementById('derive-start').value) || 0;

    showStatus('Deriving addresses...', 'info');
    derivedAddresses = deriveAddresses(xpub, hdkey.origin, start, count);
    renderAddresses(derivedAddresses);

    showStatus(`Successfully decoded and derived ${count} addresses.`, 'success');

  } catch (err) {
    console.error(err);
    showStatus(err.message, 'error');
  }
}

function rederive() {
  if (!currentXpub) return;
  const count = parseInt(document.getElementById('derive-count').value) || 100;
  const start = parseInt(document.getElementById('derive-start').value) || 0;
  try {
    derivedAddresses = deriveAddresses(currentXpub, currentHDKey?.origin, start, count);
    renderAddresses(derivedAddresses);
    showStatus(`Derived ${count} addresses starting from index ${start}.`, 'success');
  } catch (err) {
    showStatus(err.message, 'error');
  }
}

function renderAddresses(addresses) {
  const tbody = document.getElementById('addr-tbody');
  tbody.innerHTML = '';
  document.getElementById('addr-section').style.display = '';
  document.getElementById('addr-count').textContent = addresses.length;

  addresses.forEach(a => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="idx">${a.index}</td>
      <td class="path-cell">${a.path}</td>
      <td class="addr-cell">${a.address}</td>
      <td><button class="copy-btn" onclick="copyAddr(this, '${a.address}')">copy</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function copyAddr(btn, addr) {
  navigator.clipboard.writeText(addr).then(() => {
    btn.textContent = 'copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500);
  });
}

function copyAll() {
  const text = derivedAddresses.map(a => `${a.index}\t${a.path}\t${a.address}`).join('\n');
  navigator.clipboard.writeText(text).then(() => showStatus('All addresses copied to clipboard.', 'success'));
}

function exportCSV() {
  const rows = ['Index,Path,Address'];
  derivedAddresses.forEach(a => rows.push(`${a.index},${a.path},${a.address}`));
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'derived-addresses.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ============================================================
// CAMERA QR SCANNING
// ============================================================
let cameraStream = null;
let scanInterval = null;

async function toggleCamera() {
  const box = document.getElementById('camera-box');
  const btn = document.getElementById('btn-camera');

  if (cameraStream) {
    stopCamera();
    return;
  }

  try {
    const video = document.getElementById('camera-video');
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = cameraStream;
    box.classList.add('active');
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Stop Camera`;

    // Start scanning frames
    const canvas = document.getElementById('qr-canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    scanInterval = setInterval(async () => {
      if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);

      // Use BarcodeDetector if available
      if ('BarcodeDetector' in window) {
        try {
          const detector = new BarcodeDetector({ formats: ['qr_code'] });
          const barcodes = await detector.detect(canvas);
          if (barcodes.length > 0) {
            const val = barcodes[0].rawValue;
            if (val.toLowerCase().startsWith('ur:crypto-hdkey/')) {
              document.getElementById('ur-input').value = val;
              document.getElementById('scan-status').textContent = 'QR detected!';
              stopCamera();
              switchTab('paste');
              processUR(val);
            }
          }
        } catch (e) { /* scan next frame */ }
      }
    }, 300);

  } catch (err) {
    showStatus('Camera access denied or not available. Try pasting the UR string instead.', 'error');
  }
}

function stopCamera() {
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
  if (scanInterval) {
    clearInterval(scanInterval);
    scanInterval = null;
  }
  document.getElementById('camera-box').classList.remove('active');
  const btn = document.getElementById('btn-camera');
  btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Start Camera`;
}

// ============================================================
// FILE UPLOAD QR
// ============================================================
async function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  const img = new Image();
  img.onload = async () => {
    const canvas = document.getElementById('qr-canvas');
    canvas.width = img.width;
    canvas.height = img.height;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    ctx.drawImage(img, 0, 0);

    if ('BarcodeDetector' in window) {
      try {
        const detector = new BarcodeDetector({ formats: ['qr_code'] });
        const barcodes = await detector.detect(canvas);
        if (barcodes.length > 0) {
          const val = barcodes[0].rawValue;
          document.getElementById('ur-input').value = val;
          switchTab('paste');
          if (val.toLowerCase().startsWith('ur:crypto-hdkey/')) {
            processUR(val);
          } else {
            showStatus('QR detected but does not contain UR:CRYPTO-HDKEY data.', 'error');
          }
          return;
        }
      } catch (e) { /* fallback */ }
    }
    showStatus('Could not decode QR from image. Your browser may not support BarcodeDetector. Try pasting the UR string manually.', 'error');
  };
  img.src = URL.createObjectURL(file);
}

// Drag-and-drop support
const fileDrop = document.getElementById('file-drop');
fileDrop.addEventListener('dragover', e => { e.preventDefault(); fileDrop.style.borderColor = 'var(--accent)'; });
fileDrop.addEventListener('dragleave', () => { fileDrop.style.borderColor = ''; });
fileDrop.addEventListener('drop', e => {
  e.preventDefault();
  fileDrop.style.borderColor = '';
  if (e.dataTransfer.files.length) {
    document.getElementById('file-input').files = e.dataTransfer.files;
    handleFileUpload({ target: { files: e.dataTransfer.files } });
  }
});
</script>
